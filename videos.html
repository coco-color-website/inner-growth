  <title>相关视频 · 内在生长</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .videos-body {
      background: var(--bg);
      min-height: 100vh;
    }

    .videos-hero {
      text-align: center;
      padding: 110px 24px 40px;
    }

    .videos-label {
      display: inline-block;
      background: var(--rose-deep);
      color: #fff;
      padding: 8px 18px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 24px;
    }

    .videos-title {
      font-size: clamp(2.4rem, 8vw, 4rem);
      font-weight: 700;
      color: var(--ink);
      margin: 0 0 20px;
      line-height: 1.2;
    }

    .videos-lead {
      font-size: clamp(1.1rem, 3.2vw, 1.4rem);
      color: var(--ink-light);
      line-height: 1.7;
      max-width: 640px;
      margin: 0 auto;
    }

    .videos-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    .videos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .video-card {
      background: rgba(255, 255, 255, 0.7);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .video-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(139, 94, 85, 0.12);
    }

    .video-card video {
      width: 100%;
      border-radius: 12px;
      display: block;
    }

    .videos-footer {
      text-align: center;
      padding: 0 20px 60px;
    }

    .videos-footer a {
      display: inline-block;
      color: #8b5e55;
      text-decoration: none;
      border-bottom: 2px solid var(--rose-deep);
      font-weight: 600;
      font-size: 1rem;
      padding-bottom: 2px;
    }

    @media (max-width: 640px) {
      .videos-hero {
        padding-top: 100px;
      }
    }
  </style>
</head>
